<!DOCTYPE html>
<html lang="zh-Hant-TW" data-mode="auto" data-skin="classic">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="description" content="雙北捷運抽站探訪——先抽一條線，再抽三個站，出發！">
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#F7F7F5">
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#121417">
<title>雙北捷運抽站</title>
<style>
/* ============================================================
   §CSS-1 Tokens — 第一層：路線原色（恆定，不隨模式變）
   北捷六線＝官方色；V/K/LB/A 已對照 Wikipedia 官方色票模板
   ============================================================ */
:root{
  --line-BR:#C48C31; --line-R:#E3002C; --line-G:#008659; --line-O:#F8B61C;
  --line-BL:#0070BD; --line-Y:#FEDB00; --line-V:#E5554F; --line-K:#C3B091;
  --line-LB:#4EC3E0; --line-A:#8246AF;
  /* 徽章上的文字色：淺色線用黑字（對比 >= 4.5:1） */
  --on-BR:#fff; --on-R:#fff; --on-G:#fff; --on-O:#111; --on-BL:#fff;
  --on-Y:#111; --on-V:#fff; --on-K:#111; --on-LB:#111; --on-A:#fff;
  --font-sans:system-ui,-apple-system,"PingFang TC","Noto Sans TC","Microsoft JhengHei","Segoe UI",Roboto,sans-serif;
  color-scheme: light dark;
}

/* ============================================================
   §CSS-2 Tokens — 第二層：語意色（隨深淺模式變）
   ============================================================ */
:root{
  --surface:#F7F7F5; --card:#FFFFFF; --ink:#1A1C1E; --ink-2:#5D6166;
  --map-bg:#F2F1EC; --hairline:#E3E2DD; --accent:#0070BD;
  --shadow:0 4px 24px rgba(0,0,0,.12);
}
:root[data-mode="dark"]{
  --surface:#121417; --card:#1C1F24; --ink:#ECEDEE; --ink-2:#9BA1A8;
  --map-bg:#16181D; --hairline:#2A2E34; --accent:#4DA3E0;
  --shadow:0 4px 24px rgba(0,0,0,.5);
}
@media (prefers-color-scheme: dark){
  :root[data-mode="auto"]{
    --surface:#121417; --card:#1C1F24; --ink:#ECEDEE; --ink-2:#9BA1A8;
    --map-bg:#16181D; --hairline:#2A2E34; --accent:#4DA3E0;
    --shadow:0 4px 24px rgba(0,0,0,.5);
  }
}

/* ============================================================
   §CSS-3 版面
   ============================================================ */
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--font-sans);
  background:var(--surface); color:var(--ink);
  height:100vh; height:100dvh;
  overflow:hidden;
  overscroll-behavior:none;
}
header{
  position:fixed; inset:0 0 auto 0; z-index:20;
  display:flex; align-items:center; gap:8px;
  padding:calc(10px + env(safe-area-inset-top)) 16px 10px;
  pointer-events:none; /* 讓地圖手勢穿透，按鈕自己開回來 */
}
header h1{
  font-size:1.125rem; font-weight:800; letter-spacing:.04em;
  text-shadow:0 1px 8px var(--surface);
}
header .spacer{flex:1}
.icon-btn{
  pointer-events:auto;
  width:44px;height:44px; border:none; border-radius:12px;
  background:var(--card); color:var(--ink); box-shadow:var(--shadow);
  font-size:1.25rem; cursor:pointer;
  touch-action:manipulation;
}
.icon-btn:active{transform:scale(.94)}

/* ============================================================
   §CSS-4 地圖
   ============================================================ */
#map{
  position:absolute; inset:0;
  width:100%; height:100%;
  background:var(--map-bg);
  touch-action:none;
  user-select:none; -webkit-user-select:none;
}
#g-lines path{fill:none; stroke-linecap:round}
.dot{fill:#fff; stroke-width:3}      /* 站點白芯，深淺模式共用 */
.dot.transfer{stroke:var(--ink); stroke-width:3.5}
.hit{fill:transparent; pointer-events:all; cursor:pointer}
.lbl{
  font-family:var(--font-sans);
  font-size:13px; fill:var(--ink);
  paint-order:stroke; stroke:var(--map-bg); stroke-width:3px; stroke-linejoin:round;
}
.lbl.transfer{font-weight:600}
.debug-overlap{fill:none; stroke:#FF0044; stroke-width:2; stroke-dasharray:4 3}

/* ============================================================
   §CSS-5 Bottom sheet（骨架：僅 peek 態）
   ============================================================ */
#sheet{
  position:fixed; inset:auto 0 0 0; z-index:30;
  background:var(--card);
  border-radius:20px 20px 0 0;
  box-shadow:var(--shadow);
  padding:12px 16px calc(16px + env(safe-area-inset-bottom));
}
#sheet .handle{
  width:40px;height:4px;border-radius:2px;
  background:var(--hairline); margin:0 auto 12px;
}
#draw-btn{
  display:block; width:100%; min-height:56px;
  border:none; border-radius:16px;
  background:var(--accent); color:#fff;
  font-family:inherit; font-size:1.25rem; font-weight:800; letter-spacing:.1em;
  cursor:pointer; touch-action:manipulation;
  transition:transform .12s ease;
}
#draw-btn:active{transform:scale(.97)}

/* ============================================================
   §CSS-6 抽選儀式
   ============================================================ */
#ceremony{
  position:fixed; inset:0; z-index:40;
  display:none; flex-direction:column; align-items:center; justify-content:center;
  background:color-mix(in srgb, var(--surface) 78%, transparent);
  /* 不用 backdrop-filter：手機上成本高，且移除瞬間的大重繪會撞上鏡頭動畫起步 */
}
#ceremony.show{display:flex}
#slot{display:flex; flex-direction:column; gap:10px; align-items:center}
.capsule{
  min-width:230px; text-align:center;
  padding:13px 28px; border-radius:999px;
  font-size:1.25rem; font-weight:800; letter-spacing:.15em;
  background:var(--card); color:var(--ink);
  opacity:.3; transform:scale(.88);
  transition:transform .1s ease, opacity .1s ease;
}
.capsule.cur{
  opacity:1; transform:scale(1); box-shadow:var(--shadow);
  background:var(--cap-bg, var(--card)); color:var(--cap-fg, var(--ink));
}
.capsule.cur.landed{transform:scale(1.15)}
#ceremony .hint{
  position:absolute; bottom:calc(140px + env(safe-area-inset-bottom));
  left:0; right:0; text-align:center;
  color:var(--ink-2); font-size:.875rem;
}
@media (prefers-reduced-motion: reduce){
  .capsule{transition:none}
}

/* 地圖 dim 與釘選高亮
   （transition 只給 10 條線 path——站點/label 數量大，同步補間會在手機掉幀） */
#map .line.dimmed{opacity:.15; transition:opacity .3s ease}
#map .dot.dimmed, #map .lbl.dimmed{opacity:.15}
#map .lbl.semi{opacity:.4}
#map .lbl.picked{font-weight:800; font-size:17px}

/* Label 三級 LOD（依縮放層級，由 Camera 切 data-lod；抽中站永遠顯示） */
#g-labels text{text-rendering:optimizeSpeed}
#map[data-lod="0"] .lbl{display:none}
#map[data-lod="1"] .lbl{display:none}
#map[data-lod="1"] .lbl.tA{display:inline}
#map .lbl.picked{display:inline !important}
#hop-dot{fill:var(--ink); stroke:var(--card); stroke-width:2}
.pin-pop{
  transform-box:fill-box; transform-origin:center;
  animation:pin-in .5s cubic-bezier(.34,1.56,.64,1);
}
@keyframes pin-in{from{transform:scale(2.6); opacity:0} to{transform:scale(1); opacity:1}}
.pin .halo{opacity:.2}
.pin .core{stroke:var(--card); stroke-width:2.5}
.pin .pin-num{font-family:var(--font-sans); font-size:15px; font-weight:800}
.pin .pulse{
  fill:none; stroke-width:4;
  transform-box:fill-box; transform-origin:center;
  animation:pulse 1.6s ease-out 5;   /* 5 次後停，避免落定後持續重繪 */
  opacity:0;
}
@keyframes pulse{from{transform:scale(1); opacity:.9} to{transform:scale(2.8); opacity:0}}
@media (prefers-reduced-motion: reduce){
  .pin-pop{animation:none}
  .pin .pulse{animation:none; opacity:.4}
}

/* 結果列（迷你版；完整卡片於 Step 5/7） */
#result{margin-bottom:12px}
#result .line-badge{
  display:inline-block; padding:6px 14px; border-radius:999px;
  font-weight:800; letter-spacing:.06em; margin-bottom:10px;
}
#result .picks{list-style:none; display:flex; gap:8px}
#result .pick-chip{
  flex:1; background:var(--surface); border:1px solid var(--hairline);
  border-radius:12px; padding:10px 6px; text-align:center;
  opacity:0; transform:translateY(10px);
  transition:opacity .3s ease, transform .3s ease;
}
#result .pick-chip.in{opacity:1; transform:none}
#result .pick-chip .idx{
  display:inline-flex; align-items:center; justify-content:center;
  width:18px; height:18px; border-radius:50%;
  font-size:.75rem; font-weight:800; margin-bottom:4px;
}
#result .pick-chip .code{
  display:block; font-size:.75rem; color:var(--ink-2);
  font-variant-numeric:tabular-nums; margin-bottom:2px;
}
#result .pick-chip .nm{font-weight:600; font-size:1.0625rem}
.sr-only{position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0 0 0 0); white-space:nowrap}

/* ============================================================
   §CSS-7 結果動作列、面板（歷史／設定）
   ============================================================ */
#result .pick-chip{cursor:pointer}
#result .pick-chip.visited .nm::after{content:" ✓"; color:var(--accent); font-weight:800}
#result-actions{display:flex; gap:8px; margin-top:10px; margin-bottom:12px}
.sub-btn{
  flex:1; min-height:44px;
  border:1px solid var(--hairline); border-radius:12px;
  background:var(--surface); color:var(--ink);
  font-family:inherit; font-size:.9375rem; font-weight:600;
  cursor:pointer; touch-action:manipulation;
}
.sub-btn:active{transform:scale(.97)}

.panel{
  position:fixed; inset:0; z-index:50;
  background:var(--surface);
  display:none; flex-direction:column;
  transform:translateY(24px); opacity:0;
  transition:transform .25s ease, opacity .25s ease;
}
.panel.show{display:flex}
.panel.in{transform:none; opacity:1}
@media (prefers-reduced-motion: reduce){.panel{transition:none}}
.panel-head{
  display:flex; align-items:center; gap:8px;
  padding:calc(12px + env(safe-area-inset-top)) 16px 12px;
}
.panel-head h2{font-size:1.125rem; font-weight:800}
.panel-head .spacer{flex:1}
.panel .body{
  flex:1; overflow-y:auto;
  padding:0 16px calc(24px + env(safe-area-inset-bottom));
  overscroll-behavior:contain;
}
.section-title{
  font-size:.8125rem; font-weight:600; color:var(--ink-2);
  margin:18px 0 4px; letter-spacing:.08em;
}
.row{
  display:flex; align-items:center; justify-content:space-between; gap:12px;
  padding:14px 0; border-bottom:1px solid var(--hairline);
  font-size:1rem;
}
.row input[type="checkbox"]{width:22px; height:22px; accent-color:var(--accent); flex:none}
.seg{display:flex; gap:0; border:1px solid var(--hairline); border-radius:10px; overflow:hidden}
.seg button{
  min-height:36px; padding:0 14px; border:none;
  background:transparent; color:var(--ink);
  font-family:inherit; font-size:.9375rem; cursor:pointer;
  touch-action:manipulation;
}
.seg button.on{background:var(--accent); color:#fff; font-weight:600}

.progress{height:8px; background:var(--hairline); border-radius:4px; margin:6px 0 2px}
.progress i{display:block; height:100%; width:0; background:var(--accent); border-radius:4px}
.progress-txt{font-size:.875rem; color:var(--ink-2); margin-bottom:8px}
.h-entry{padding:12px 0; border-bottom:1px solid var(--hairline)}
.h-meta{display:flex; align-items:center; gap:10px}
.h-date{font-size:.8125rem; color:var(--ink-2); font-variant-numeric:tabular-nums}
.h-badge{padding:3px 10px; border-radius:999px; font-size:.8125rem; font-weight:800}
.h-sts{display:flex; gap:8px; margin-top:8px; flex-wrap:wrap}
.h-st{
  border:1px solid var(--hairline); border-radius:999px;
  padding:7px 14px; font-size:.9375rem; background:var(--card); color:var(--ink);
  font-family:inherit; cursor:pointer; touch-action:manipulation;
}
.h-st.visited{background:var(--accent); border-color:var(--accent); color:#fff}
.empty-hint{color:var(--ink-2); text-align:center; padding:32px 0}
.danger{color:#C62828}

/* 重新對焦浮動鈕 */
#refocus{
  position:fixed; right:16px;
  bottom:calc(128px + env(safe-area-inset-bottom));
  z-index:25;
  width:44px;height:44px; border:none; border-radius:12px;
  background:var(--card); color:var(--ink); box-shadow:var(--shadow);
  font-size:1.375rem; cursor:pointer;
  touch-action:manipulation;
}
#refocus:active{transform:scale(.94)}

/* Toast */
#toast{
  position:fixed; left:50%; bottom:calc(120px + env(safe-area-inset-bottom));
  transform:translateX(-50%) translateY(8px);
  z-index:99; max-width:86vw;
  background:var(--ink); color:var(--surface);
  padding:10px 18px; border-radius:12px; font-size:.9375rem;
  opacity:0; pointer-events:none;
  transition:opacity .25s ease, transform .25s ease;
}
#toast.show{opacity:1; transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<header>
  <h1>雙北捷運抽站</h1>
  <div class="spacer"></div>
  <button class="icon-btn" id="btn-history" aria-label="歷史紀錄" title="歷史紀錄">🕘</button>
  <button class="icon-btn" id="btn-settings" aria-label="設定" title="設定">⚙️</button>
</header>

<svg id="map" viewBox="0 0 1500 1800" role="img" aria-label="雙北捷運路網圖">
  <title>雙北捷運路網圖</title>
  <g id="world">
    <g id="g-lines"></g>
    <g id="g-stations"></g>
    <g id="g-highlight"></g>
    <g id="g-labels"></g>
    <g id="g-debug"></g>
  </g>
</svg>

<button id="refocus" aria-label="重新對焦" title="重新對焦">⌖</button>

<div id="ceremony" aria-hidden="true">
  <div id="slot">
    <div class="capsule" id="cap-prev"></div>
    <div class="capsule cur" id="cap-cur"></div>
    <div class="capsule" id="cap-next"></div>
  </div>
  <div class="hint">點一下跳過動畫</div>
</div>

<div id="sheet">
  <div class="handle"></div>
  <div id="result" hidden>
    <span class="line-badge" id="result-badge"></span>
    <ol class="picks" id="result-picks"></ol>
    <div id="result-actions">
      <button class="sub-btn" id="btn-visit-all">✓ 標記三站已探訪</button>
      <button class="sub-btn" id="btn-share">↗ 分享</button>
    </div>
  </div>
  <button id="draw-btn">🎲 抽 站 去 ！</button>
</div>

<div class="panel" id="panel-history" role="dialog" aria-modal="true" aria-label="歷史紀錄">
  <div class="panel-head">
    <h2>🕘 歷史紀錄</h2><span class="spacer"></span>
    <button class="icon-btn" data-close aria-label="關閉">✕</button>
  </div>
  <div class="body">
    <div class="progress-txt" id="hist-progress-txt"></div>
    <div class="progress"><i id="hist-progress-bar"></i></div>
    <p class="progress-txt">點站名可切換「已探訪」狀態</p>
    <div id="hist-list"></div>
    <p class="section-title">資料</p>
    <button class="sub-btn danger" id="btn-clear-history" style="width:100%">清除歷史紀錄</button>
  </div>
</div>

<div class="panel" id="panel-settings" role="dialog" aria-modal="true" aria-label="設定">
  <div class="panel-head">
    <h2>⚙️ 設定</h2><span class="spacer"></span>
    <button class="icon-btn" data-close aria-label="關閉">✕</button>
  </div>
  <div class="body">
    <p class="section-title">外觀</p>
    <div class="row"><span>深淺模式</span>
      <div class="seg" id="seg-mode">
        <button data-mode="auto">自動</button>
        <button data-mode="light">淺色</button>
        <button data-mode="dark">深色</button>
      </div>
    </div>
    <p class="section-title">抽選範圍</p>
    <label class="row"><span>排除已探訪的站</span><input type="checkbox" id="opt-exclude-visited"></label>
    <label class="row"><span>排除機場捷運桃園段（A7–A22）</span><input type="checkbox" id="opt-exclude-taoyuan"></label>
    <p class="section-title">回饋</p>
    <label class="row" id="row-vibrate"><span>震動</span><input type="checkbox" id="opt-vibrate"></label>
    <label class="row"><span>音效（建置中）</span><input type="checkbox" id="opt-sound"></label>
    <p class="section-title">資料</p>
    <button class="sub-btn" id="btn-clear-visited" style="width:100%; margin-bottom:8px">清除已探訪紀錄</button>
    <button class="sub-btn danger" id="btn-clear-all" style="width:100%">清除全部資料</button>
    <p class="progress-txt" style="margin-top:20px">
      站點資料查證自維基百科（2026-07）；路線代表色取自各營運機構官方色票。
    </p>
  </div>
</div>

<div id="toast" role="status" aria-live="polite"></div>
<div id="sr-announce" class="sr-only" role="status" aria-live="polite"></div>

<script>
(() => {
'use strict';

/* ============================================================
   §1 DATA — 路線與站點資料
   座標系：1500x1800、網格 U=50、座標吸附 25 的倍數
   station.id ＝ codes 第一個站碼的小寫（實體站唯一）
   dir ＝ 站名 label 的 8 方位
   （目前為試點：文湖線＋板南線；其餘 8 線於 Step 6 補入）
   ============================================================ */
/* DATA:BEGIN（tools/verify-data.mjs 以此標記抽取驗證） */
const STATIONS = [
  // --- 文湖線 BR（南段：動物園 → 忠孝復興） ---
  {id:'br01', name:'動物園',       x:1250, y:1375, codes:{BR:'BR01'}, dir:'E'},
  {id:'br02', name:'木柵',         x:1200, y:1325, codes:{BR:'BR02'}, dir:'E'},
  {id:'br03', name:'萬芳社區',     x:1150, y:1275, codes:{BR:'BR03'}, dir:'E'},
  {id:'br04', name:'萬芳醫院',     x:1100, y:1225, codes:{BR:'BR04'}, dir:'E'},
  {id:'br05', name:'辛亥',         x:1050, y:1175, codes:{BR:'BR05'}, dir:'E'},
  {id:'br06', name:'麟光',         x:1050, y:1100, codes:{BR:'BR06'}, dir:'E'},
  {id:'br07', name:'六張犁',       x:1050, y:1025, codes:{BR:'BR07'}, dir:'E'},
  {id:'br08', name:'科技大樓',     x:1050, y:950,  codes:{BR:'BR08'}, dir:'E'},
  {id:'r05',  name:'大安',         x:1050, y:875,  codes:{R:'R05', BR:'BR09'}, dir:'E'},
  {id:'br10', name:'忠孝復興',     x:1050, y:800,  codes:{BR:'BR10', BL:'BL15'}, dir:'SE'},
  // --- 文湖線 BR（北段：南京復興 → 南港展覽館） ---
  {id:'g16',  name:'南京復興',     x:1050, y:725,  codes:{G:'G16', BR:'BR11'}, dir:'E'},
  {id:'br12', name:'中山國中',     x:1050, y:650,  codes:{BR:'BR12'}, dir:'E'},
  {id:'br13', name:'松山機場',     x:1050, y:575,  codes:{BR:'BR13'}, dir:'E'},
  {id:'br14', name:'大直',         x:1100, y:525,  codes:{BR:'BR14'}, dir:'NW'},
  {id:'br15', name:'劍南路',       x:1150, y:475,  codes:{BR:'BR15'}, dir:'N'},
  {id:'br16', name:'西湖',         x:1225, y:475,  codes:{BR:'BR16'}, dir:'N'},
  {id:'br17', name:'港墘',         x:1300, y:475,  codes:{BR:'BR17'}, dir:'N'},
  {id:'br18', name:'文德',         x:1375, y:475,  codes:{BR:'BR18'}, dir:'N'},
  {id:'br19', name:'內湖',         x:1450, y:500,  codes:{BR:'BR19'}, dir:'W'},
  {id:'br20', name:'大湖公園',     x:1450, y:550,  codes:{BR:'BR20'}, dir:'W'},
  {id:'br21', name:'葫洲',         x:1450, y:600,  codes:{BR:'BR21'}, dir:'W'},
  {id:'br22', name:'東湖',         x:1450, y:650,  codes:{BR:'BR22'}, dir:'W'},
  {id:'br23', name:'南港軟體園區', x:1450, y:700,  codes:{BR:'BR23'}, dir:'W'},
  {id:'bl23', name:'南港展覽館',   x:1450, y:750,  codes:{BL:'BL23', BR:'BR24'}, dir:'W'},
  // --- 板南線 BL（西南段：頂埔 → 江子翠，45° 斜線） ---
  {id:'bl01', name:'頂埔',         x:200,  y:1200, codes:{BL:'BL01', LB:'LB01'}, dir:'E'},
  {id:'bl02', name:'永寧',         x:250,  y:1150, codes:{BL:'BL02'}, dir:'E'},
  {id:'bl03', name:'土城',         x:300,  y:1100, codes:{BL:'BL03'}, dir:'E'},

  line.segments = line.segments.map(
    seg => seg.filter(p => typeof p !== 'string' || S[p]?.enabled !== false));
}
for (const line of LINES){
  const ids = [];
  for (const seg of line.segments)
    for (const p of seg)
      if (typeof p === 'string' && !ids.includes(p)) ids.push(p);
  line.stationIds = ids;
  for (const id of ids){
    const st = S[id];
    if (!st) { console.error(`資料錯誤：找不到站 ${id}（${line.id}）`); continue; }
    (st.lines ??= []).push(line.id);
  }

for (const line of LINES)

    if (ids.length){ S[ids[0]].isTerminal = true; S[ids[ids.length-1]].isTerminal = true; }
  }
for (const [lid, n] of Object.entries(EXPECTED_COUNTS)){
  const line = LINES.find(l => l.id === lid);
  console.assert(line && line.stationIds.length === n,
    `站數 assert 失敗：${lid} 應為 ${n}，實際 ${line?.stationIds.length}`);

/* ============================================================
   §2 Store — localStorage 包裝（Safari 無痕降級記憶體模式）
   ============================================================ */
const Store = (() => {
  const KEY = 'tmd.v1';
  const DEFAULTS = {
    version: 1,
    settings: { excludeVisited:false, excludeTaoyuan:false, skin:'classic', mode:'auto', sound:false, vibrate:true },
    visited: [],
    history: [],
  };
  let mem = null; // localStorage 不可用時的記憶體備援
  function load(){
    if (mem) return mem;
    try {
      const raw = localStorage.getItem(KEY);
      if (!raw) return structuredClone(DEFAULTS);
      const data = JSON.parse(raw);
      return { ...structuredClone(DEFAULTS), ...data, settings: { ...DEFAULTS.settings, ...(data.settings||{}) } };
    } catch { return mem = structuredClone(DEFAULTS); }
  }
  function save(data){
    try { localStorage.setItem(KEY, JSON.stringify(data)); }
    catch { mem = data; }
  }
  return { load, save };
})();

/* ============================================================
   §3 Geometry — 圓角折線與 bbox 工具
   ============================================================ */
function roundedPathD(pts, r = 18){
  if (pts.length < 2) return '';
  let d = `M ${pts[0][0]} ${pts[0][1]}`;
  for (let i = 1; i < pts.length - 1; i++){
    const [x0,y0] = pts[i-1], [x1,y1] = pts[i], [x2,y2] = pts[i+1];
    const v1 = [x1-x0, y1-y0], v2 = [x2-x1, y2-y1];
    const l1 = Math.hypot(...v1), l2 = Math.hypot(...v2);
    const cross = v1[0]*v2[1] - v1[1]*v2[0];
    if (Math.abs(cross) < 1e-6) continue;      // 共線點：直接穿過
    const rr = Math.min(r, l1/2, l2/2);
    const pA = [x1 - v1[0]/l1*rr, y1 - v1[1]/l1*rr];
    const pB = [x1 + v2[0]/l2*rr, y1 + v2[1]/l2*rr];
    d += ` L ${pA[0]} ${pA[1]} Q ${x1} ${y1} ${pB[0]} ${pB[1]}`;
  }
  const [xe,ye] = pts[pts.length-1];
  d += ` L ${xe} ${ye}`;
  return d;
}

function segToPoints(seg){
  return seg.map(p => typeof p === 'string' ? [S[p].x, S[p].y] : p);
}

/* label 8 方位 → 錨點與偏移 */

function contentBBox(){
  let x0=Infinity, y0=Infinity, x1=-Infinity, y1=-Infinity;
  for (const line of LINES)
    for (const seg of line.segments)
      for (const [x,y] of segToPoints(seg)){
        x0=Math.min(x0,x); y0=Math.min(y0,y); x1=Math.max(x1,x); y1=Math.max(y1,y);
      }
  return {x:x0, y:y0, w:x1-x0, h:y1-y0};
}

/* ============================================================
   §5 Camera — {cx, cy, scale} 單一狀態，唯一寫入點 apply()
   scale ＝ 螢幕 CSS px / world unit
   自動 focus、pinch、wheel 全走同一套換算
   ============================================================ */
const Camera = (() => {
  const AUTO_MAX = 1.5;      // 自動 focus 的縮放上限（避免三站相鄰時失去脈絡）
  const MANUAL_MAX = 3.0;    // 手動 pinch 上限
  const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)');

  let cx = 750, cy = 900, scale = 0.5;
  let svgW = 1, svgH = 1;
  let minScale = 0.05;
  let bounds = {x:0, y:0, w:1500, h:1800};   // 相機中心可移動範圍
  let anim = null;
  let lastFocus = null;                       // 最近一次 focus 的 bbox（⌖ 用）

  function measure(){
    svgW = svg.clientWidth || 1;
    svgH = svg.clientHeight || 1;
    const b = contentBBox(), m = 120;
    bounds = {x:b.x-m, y:b.y-m, w:b.w+m*2, h:b.h+m*2};
    minScale = Math.min(svgW/bounds.w, svgH/bounds.h);
  }
  function insets(){
    const header = document.querySelector('header');
    const sheet = document.getElementById('sheet');
    return {
      top: header.getBoundingClientRect().bottom + 8,
      bottom: (sheet?.getBoundingClientRect().height ?? 0) + 8,
    };
  }
  function clampState(){
    scale = Math.min(Math.max(scale, minScale), MANUAL_MAX);
    cx = Math.min(Math.max(cx, bounds.x), bounds.x + bounds.w);
    cy = Math.min(Math.max(cy, bounds.y), bounds.y + bounds.h);
  }
  /* Label LOD：0=無 label、1=轉乘＋端點、2=全部；動畫期間鎖定目標層級 */
  const lodTier = s => s < 0.45 ? 0 : s < 0.85 ? 1 : 2;
  let lodLock = null;
  function apply(){
    const vw = svgW/scale, vh = svgH/scale;
    svg.setAttribute('viewBox', `${cx - vw/2} ${cy - vh/2} ${vw} ${vh}`);
    const tier = String(lodLock ?? lodTier(scale));
    if (svg.dataset.lod !== tier) svg.dataset.lod = tier;
    svg.dispatchEvent(new Event('camerachange'));
  }

  /* bbox → 目標相機（padding、insets、縮放上限、sheet 位移補償） */
  function fitBBox(bbox, {maxScale = AUTO_MAX, remember = true} = {}){
    if (remember) lastFocus = bbox;
    const ins = insets();
    const availW = Math.max(80, svgW - 32);
    const availH = Math.max(80, svgH - ins.top - ins.bottom);
    const padX = Math.max(bbox.w * 0.15, 100);
    const padY = Math.max(bbox.h * 0.15, 100);
    let s = Math.min(availW/(bbox.w + padX*2), availH/(bbox.h + padY*2));
    s = Math.min(Math.max(s, minScale), maxScale);
    const visCenterY = ins.top + (svgH - ins.top - ins.bottom)/2;
    return {
      cx: bbox.x + bbox.w/2,
      cy: bbox.y + bbox.h/2 + (svgH/2 - visCenterY)/s,
      scale: s,
    };
  }

  const easeInOutCubic = t => t < .5 ? 4*t*t*t : 1 - Math.pow(-2*t + 2, 3)/2;

  function animateTo(target, duration = 650){
    cancelAnim();
    if (reduceMotion.matches || duration <= 0){
      ({cx, cy, scale} = target); clampState(); apply(); return;
    }
    lodLock = lodTier(target.scale);   // 動畫全程鎖定目標 LOD，避免中途切換與過量 label 重繪
    const from = {cx, cy, scale};
    const lnS0 = Math.log(from.scale), lnS1 = Math.log(target.scale);
    const t0 = performance.now();
    const step = now => {
      const t = Math.min(1, (now - t0)/duration), e = easeInOutCubic(t);
      cx = from.cx + (target.cx - from.cx)*e;
      cy = from.cy + (target.cy - from.cy)*e;
      scale = Math.exp(lnS0 + (lnS1 - lnS0)*e);   // log 空間插值，縮放感受均速
      clampState(); apply();
      if (t < 1) anim = requestAnimationFrame(step);
      else { anim = null; lodLock = null; }
    };
    anim = requestAnimationFrame(step);
  }
  function cancelAnim(){
    if (anim){ cancelAnimationFrame(anim); anim = null; }
    lodLock = null;
  }

  function focusBBox(bbox, opts = {}){ animateTo(fitBBox(bbox, opts), opts.duration ?? 650); }
  function focusContent(duration){
    measure();
    animateTo(fitBBox(contentBBox()), duration);
  }
  function refocus(){
    measure();
    animateTo(fitBBox(lastFocus ?? contentBBox()));
  }

  /* --- 手勢（Pointer Events）：使用者輸入永遠贏 --- */
  const pointers = new Map();
  let prevMid = null, prevDist = 0;

  function screenToWorld(px, py){
    return [cx + (px - svgW/2)/scale, cy + (py - svgH/2)/scale];
  }
  function zoomAt(px, py, k){
    const [wx, wy] = screenToWorld(px, py);
    scale = Math.min(Math.max(scale*k, minScale), MANUAL_MAX);
    cx = wx - (px - svgW/2)/scale;
    cy = wy - (py - svgH/2)/scale;
    clampState(); apply();
  }

  svg.addEventListener('pointerdown', e => {
    cancelAnim();
    svg.setPointerCapture(e.pointerId);
    pointers.set(e.pointerId, {x:e.clientX, y:e.clientY});
    if (pointers.size === 2){
      const [a, b] = [...pointers.values()];
      prevMid = {x:(a.x+b.x)/2, y:(a.y+b.y)/2};
      prevDist = Math.hypot(a.x-b.x, a.y-b.y);
    }
  });
  svg.addEventListener('pointermove', e => {
    if (!pointers.has(e.pointerId)) return;
    const prev = pointers.get(e.pointerId);
    pointers.set(e.pointerId, {x:e.clientX, y:e.clientY});
    if (pointers.size === 1){
      cx -= (e.clientX - prev.x)/scale;
      cy -= (e.clientY - prev.y)/scale;
      clampState(); apply();
    } else if (pointers.size === 2){
      const [a, b] = [...pointers.values()];
      const mid = {x:(a.x+b.x)/2, y:(a.y+b.y)/2};
      const dist = Math.hypot(a.x-b.x, a.y-b.y);
      if (prevDist > 0) zoomAt(mid.x, mid.y, dist/prevDist);
      cx -= (mid.x - prevMid.x)/scale;
      cy -= (mid.y - prevMid.y)/scale;
      clampState(); apply();
      prevMid = mid; prevDist = dist;
    }
  });
  function endPointer(e){
    pointers.delete(e.pointerId);
    prevMid = null; prevDist = 0;
  }
  svg.addEventListener('pointerup', endPointer);
  svg.addEventListener('pointercancel', endPointer);

  svg.addEventListener('wheel', e => {
    e.preventDefault();
    cancelAnim();
    zoomAt(e.clientX, e.clientY, Math.pow(1.0015, -e.deltaY));
  }, {passive:false});

  window.addEventListener('resize', () => {
    measure(); clampState(); apply();
  });

  function init(){
    measure();
    ({cx, cy, scale} = fitBBox(contentBBox(), {remember:false}));
    clampState(); apply();
  }

  return { init, focusBBox, focusContent, refocus, fitBBox, cancelAnim, getScale: () => scale };
})();

/* ?debug=labels — label 重疊偵測（建檔期工具） */
function debugLabels(){
  const labels = [...gLabels.querySelectorAll('.lbl')];
  const boxes = labels.map(t => ({id:t.dataset.id, b:t.getBBox()}));
  let n = 0;
  for (let i=0;i<boxes.length;i++) for (let j=i+1;j<boxes.length;j++){
    const a=boxes[i].b, b=boxes[j].b;
    if (a.x < b.x+b.width && b.x < a.x+a.width && a.y < b.y+b.height && b.y < a.y+a.height){
      n++;
      console.warn(`label 重疊：${boxes[i].id} × ${boxes[j].id}`);
      for (const bb of [a,b])
        gDebug.appendChild(el('rect', {class:'debug-overlap', x:bb.x, y:bb.y, width:bb.width, height:bb.height}));
    }
  }
  console.info(`debug=labels：檢查 ${labels.length} 個 label，重疊 ${n} 組`);
}

/* ============================================================
   §6 Picker — 抽線（均勻 1/N）→ 抽三站（partial Fisher-Yates）
   ============================================================ */
function eligibleStations(line){
  return line.stationIds.filter(id => {
    const s = S[id];
    if (s.enabled === false) return false;
    if (state.settings.excludeTaoyuan && s.area?.startsWith('桃園')) return false;
    if (state.settings.excludeVisited && state.visited.includes(id)) return false;
    return true;
  });
}
function drawResult(){
  const pool = LINES.filter(l => eligibleStations(l).length >= 3);
  if (!pool.length) return null;
  const line = pool[Math.floor(Math.random() * pool.length)];
  const ids = eligibleStations(line);
  for (let i = 0; i < 3; i++){
    const j = i + Math.floor(Math.random() * (ids.length - i));
    [ids[i], ids[j]] = [ids[j], ids[i]];
  }
  const picked = ids.slice(0, 3);
  picked.sort((a, b) => line.stationIds.indexOf(a) - line.stationIds.indexOf(b));
  return { lineId: line.id, stationIds: picked };
}

function lineBBox(line){
  let x0=Infinity, y0=Infinity, x1=-Infinity, y1=-Infinity;
  for (const seg of line.segments)
    for (const [x,y] of segToPoints(seg)){
      x0=Math.min(x0,x); y0=Math.min(y0,y); x1=Math.max(x1,x); y1=Math.max(y1,y);
    }
  return {x:x0, y:y0, w:x1-x0, h:y1-y0};
}
/* 「該線最外側兩個抽中站之間的所有點＋抽中站」的 bbox（不取整條線） */
function resultBBox(line, ids){
  const set = new Set(ids);
  const pts = [];
  for (const seg of line.segments){
    const idxs = seg.map((p,i) => typeof p === 'string' && set.has(p) ? i : -1).filter(i => i >= 0);
    if (!idxs.length) continue;
    pts.push(...segToPoints(seg.slice(Math.min(...idxs), Math.max(...idxs) + 1)));
  }
  if (!pts.length) for (const id of ids) pts.push([S[id].x, S[id].y]);
  let x0=Infinity, y0=Infinity, x1=-Infinity, y1=-Infinity;
  for (const [x,y] of pts){
    x0=Math.min(x0,x); y0=Math.min(y0,y); x1=Math.max(x1,x); y1=Math.max(y1,y);
  }
  return {x:x0, y:y0, w:x1-x0, h:y1-y0};
}

/* ============================================================
   §7 Ceremony — 老虎機抽線 → 鏡頭推進 → 光點跳選三站
   動畫期間點擊任意處＝跳過（使用者輸入永遠贏）
   ============================================================ */
const buzz = p => {
  if (state.settings.vibrate && navigator.vibrate) try { navigator.vibrate(p); } catch {}
};

let ceremonyActive = false, skipped = false, waitResolvers = [];
function cwait(ms){
  return new Promise(res => {
    if (skipped) return res();
    const id = setTimeout(() => { waitResolvers = waitResolvers.filter(r => r.id !== id); res(); }, ms);
    waitResolvers.push({id, res});
  });
}
function requestSkip(){
  if (!ceremonyActive || skipped) return;
  skipped = true;
  Camera.cancelAnim();
  for (const {id, res} of waitResolvers){ clearTimeout(id); res(); }
  waitResolvers = [];
}

const ceremonyEl = document.getElementById('ceremony');
const caps = {
  prev: document.getElementById('cap-prev'),

};

function rollSequence(target, n){
  const seq = [];
  let last = null;
  for (let i = 0; i < n - 1; i++){
    let c;
    do { c = LINES[Math.floor(Math.random() * LINES.length)]; } while (LINES.length > 1 && c === last);
    seq.push(c); last = c;
  }
  if (LINES.length > 1 && last === target) seq[n-2] = LINES.find(l => l !== target);
  seq.push(target);
  return seq;
}
function showSlot(seq, i){
  caps.prev.textContent = seq[i-1]?.name ?? '';
  caps.next.textContent = seq[i+1]?.name ?? '';
  caps.cur.textContent  = seq[i].name;
  caps.cur.style.setProperty('--cap-bg', `var(--line-${seq[i].id})`);
  caps.cur.style.setProperty('--cap-fg', `var(--on-${seq[i].id})`);
}

   （長線全景時三個編號標記依然清楚可辨） */

  idx.className = 'idx';
  idx.textContent = k + 1;
  idx.style.background = `var(--line-${line.id})`;
  idx.style.color = `var(--on-${line.id})`;
  const code = document.createElement('span');
  code.className = 'code';
  code.textContent = s.codes[line.id] ?? Object.values(s.codes)[0];
  const nm = document.createElement('span');
  nm.className = 'nm';
  nm.textContent = s.name;
  li.append(idx, code, nm);
  li.addEventListener('click', () => flyToStation(id));
  picksEl.appendChild(li);
  requestAnimationFrame(() => li.classList.add('in'));
}

async function runCeremony(){
  const result = drawResult();
  if (!result){
    toast('沒有可抽的線——排除條件太嚴了，請到設定放寬');
    return;
  }
  const line = LINES.find(l => l.id === result.lineId);

  ceremonyActive = true; skipped = false;
  drawBtn.disabled = true;
  clearResultRow(); clearPins(); dimAll(true);
  Camera.cancelAnim();

  /* 抽線老虎機 */
  ceremonyEl.classList.add('show');
  caps.cur.classList.remove('landed');
  const seq = rollSequence(line, 13);
  for (let i = 0; i < seq.length && !skipped; i++){
    showSlot(seq, i);
    buzz(6);
    await cwait(55 + Math.pow(i/(seq.length-1), 2.2) * 240);
  }
  showSlot([line], 0);
  caps.cur.classList.add('landed');
  setDims(line.id);
  buzz([30, 40, 30]);
  if (!skipped) await cwait(550);
  ceremonyEl.classList.remove('show');

  /* 鏡頭推進整條線 */
  Camera.focusBBox(lineBBox(line), {duration: skipped ? 0 : 800});
  if (!skipped) await cwait(900);

  /* 光點沿線跳選三站 */
  const onLine = line.stationIds;
  const hop = el('circle', {id:'hop-dot', r:9, cx:S[onLine[0]].x, cy:S[onLine[0]].y});
  gHighlight.appendChild(hop);
  for (let k = 0; k < 3; k++){
    const targetId = result.stationIds[k];
    if (!skipped){
      const hops = 6 + k;
      let pos = Math.floor(Math.random() * onLine.length);
      for (let h = 0; h < hops && !skipped; h++){
        pos = (pos + 1 + Math.floor(Math.random() * 2)) % onLine.length;
        const st = S[h === hops - 1 ? targetId : onLine[pos]];
        hop.setAttribute('cx', st.x); hop.setAttribute('cy', st.y);
        buzz(4);
        await cwait(50 + Math.pow(h/(hops-1), 2) * (130 + k * 40));
      }
    }
    pinStation(targetId, line.id, k);
    buzz(30);
    addChip(targetId, line, k);
    if (!skipped) await cwait(250 + k * 80);
  }
  hop.remove();

  /* 收尾：半透明化未抽中站名、記錄歷史、等 sheet 長高後再 focus 三站框 */
  semiDimUnpicked(line, result.stationIds);
  currentResult = result;
  state.history.unshift({ts: Date.now(), line: line.id, stations: [...result.stationIds]});
  if (state.history.length > 50) state.history.length = 50;
  Store.save(state);
  srEl.textContent = `抽中${line.name}：${result.stationIds.map(id => S[id].name).join('、')}`;
  const dur = skipped ? 0 : 700;
  requestAnimationFrame(() => {
    Camera.focusBBox(resultBBox(line, result.stationIds), {duration: dur});
  });
  drawBtn.textContent = '🎲 再 抽 一 次';
  drawBtn.disabled = false;
  ceremonyActive = false;
}

ceremonyEl.addEventListener('pointerdown', e => { e.preventDefault(); requestSkip(); });
document.addEventListener('pointerdown', () => { if (ceremonyActive) requestSkip(); }, true);

/* ============================================================
   §8 UI — 模式套用與 toast
   ============================================================ */
const state = Store.load();

function applyMode(){
  document.documentElement.dataset.mode = state.settings.mode;
  document.documentElement.dataset.skin = state.settings.skin;
}

const toastEl = document.getElementById('toast');
let toastTimer = 0;
function toast(msg){
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2400);
}

/* --- 已探訪 --- */
function setVisited(id, on){
  const has = state.visited.includes(id);
  if (on && !has) state.visited.push(id);
  if (!on && has) state.visited = state.visited.filter(v => v !== id);
  Store.save(state);
  syncVisitedUI();
}
function syncVisitedUI(){
  const v = new Set(state.visited);
  for (const li of picksEl.querySelectorAll('.pick-chip'))
    li.classList.toggle('visited', v.has(li.dataset.id));
  if (panelHistory.classList.contains('show')) renderHistory();
}
function flyToStation(id){
  const s = S[id];
  Camera.focusBBox({x:s.x, y:s.y, w:0, h:0}, {maxScale:1.5, remember:false});
}

/* --- 面板 --- */
const panelHistory  = document.getElementById('panel-history');
const panelSettings = document.getElementById('panel-settings');
function openPanel(p){
  p.classList.add('show');
  requestAnimationFrame(() => p.classList.add('in'));
}
function closePanel(p){
  p.classList.remove('in');
  setTimeout(() => p.classList.remove('show'), 260);
}
for (const p of [panelHistory, panelSettings])
  p.querySelector('[data-close]').addEventListener('click', () => closePanel(p));
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') for (const p of [panelHistory, panelSettings]) closePanel(p);
});

/* --- 歷史紀錄 --- */
const histList = document.getElementById('hist-list');
const histTxt  = document.getElementById('hist-progress-txt');
const histBar  = document.getElementById('hist-progress-bar');
function renderHistory(){
  const v = new Set(state.visited);
  const total = STATIONS.filter(s => s.enabled !== false).length;
  const visCount = state.visited.filter(id => S[id]).length;
  histTxt.textContent = `已探訪 ${visCount} / ${total} 站`;
  histBar.style.width = total ? (100 * visCount / total) + '%' : '0';
  histList.innerHTML = '';
  if (!state.history.length){
    histList.innerHTML = '<p class="empty-hint">還沒有抽選紀錄——回主畫面抽一次吧！</p>';
    return;
  }
  for (const h of state.history){
    const line = LINES.find(l => l.id === h.line);
    const div = document.createElement('div'); div.className = 'h-entry';
    const meta = document.createElement('div'); meta.className = 'h-meta';
    const badge = document.createElement('span'); badge.className = 'h-badge';
    badge.textContent = line?.name ?? h.line;
    if (line){
      badge.style.background = `var(--line-${line.id})`;
      badge.style.color = `var(--on-${line.id})`;
    }
    const date = document.createElement('span'); date.className = 'h-date';
    date.textContent = new Date(h.ts).toLocaleString('zh-TW',
      {year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', hour12:false});
    meta.append(badge, date);
    const sts = document.createElement('div'); sts.className = 'h-sts';
    for (const id of h.stations){
      const b = document.createElement('button');
      b.className = 'h-st' + (v.has(id) ? ' visited' : '');
      b.textContent = S[id]?.name ?? id;
      b.addEventListener('click', () => setVisited(id, !state.visited.includes(id)));
      sts.append(b);
    }
    div.append(meta, sts);
    histList.append(div);
  }
}
document.getElementById('btn-clear-history').addEventListener('click', () => {
  if (!state.history.length || !confirm('確定清除全部抽選紀錄？（已探訪狀態會保留）')) return;
  state.history = [];
  Store.save(state);
  renderHistory();
  toast('已清除歷史紀錄');
});

/* --- 設定 --- */
const segMode = document.getElementById('seg-mode');
const optExV  = document.getElementById('opt-exclude-visited');
const optExT  = document.getElementById('opt-exclude-taoyuan');
const optVib  = document.getElementById('opt-vibrate');
const optSnd  = document.getElementById('opt-sound');
function syncSettingsUI(){
  for (const b of segMode.querySelectorAll('button'))
    b.classList.toggle('on', b.dataset.mode === state.settings.mode);
  optExV.checked = state.settings.excludeVisited;
  optExT.checked = state.settings.excludeTaoyuan;
  optVib.checked = state.settings.vibrate;
  optSnd.checked = state.settings.sound;
  document.getElementById('row-vibrate').style.display = navigator.vibrate ? '' : 'none';
}
segMode.addEventListener('click', e => {
  const b = e.target.closest('button');
  if (!b) return;
  state.settings.mode = b.dataset.mode;
  Store.save(state);
  applyMode();
  syncSettingsUI();
});
optExV.addEventListener('change', () => { state.settings.excludeVisited = optExV.checked; Store.save(state); });
optExT.addEventListener('change', () => { state.settings.excludeTaoyuan = optExT.checked; Store.save(state); });
optVib.addEventListener('change', () => { state.settings.vibrate = optVib.checked; Store.save(state); });
optSnd.addEventListener('change', () => { state.settings.sound = optSnd.checked; Store.save(state); });
document.getElementById('btn-clear-visited').addEventListener('click', () => {
  if (!state.visited.length || !confirm('確定清除全部「已探訪」紀錄？')) return;
  state.visited = [];
  Store.save(state);
  syncVisitedUI();
  toast('已清除已探訪紀錄');
});
document.getElementById('btn-clear-all').addEventListener('click', () => {
  if (!confirm('確定清除全部資料（歷史＋已探訪＋設定）？')) return;
  try { localStorage.removeItem('tmd.v1'); } catch {}
  location.reload();
});

/* --- 分享 --- */
async function share(){
  if (!currentResult) return;
  const line = LINES.find(l => l.id === currentResult.lineId);
  const names = currentResult.stationIds.map(id => S[id].name).join('、');
  const text = `【雙北捷運抽站】今天抽中 ${line.name}：${names}！`;
  const url = 'https://a102304043.github.io/TaipeiMetroDraw/';
  try {
    if (navigator.share) await navigator.share({title:'雙北捷運抽站', text, url});
    else { await navigator.clipboard.writeText(`${text} ${url}`); toast('已複製到剪貼簿'); }
  } catch {}
}
document.getElementById('btn-visit-all').addEventListener('click', () => {
  if (!currentResult) return;
  for (const id of currentResult.stationIds) setVisited(id, true);
  toast('已標記三站為已探訪 ✓');
});
document.getElementById('btn-share').addEventListener('click', share);

/* ============================================================
   §9 init
   ============================================================ */
applyMode();
renderMap();
Camera.init();
const DEBUG = new URLSearchParams(location.search).get('debug');
if (DEBUG === 'labels') debugLabels();
if (DEBUG) window.__tmd = { drawResult, LINES, STATIONS, S, state, Camera };  // 測試掛鉤

document.getElementById('refocus').addEventListener('click', () => Camera.refocus());
drawBtn.addEventListener('click', runCeremony);
document.getElementById('btn-history').addEventListener('click', () => { renderHistory(); openPanel(panelHistory); });
document.getElementById('btn-settings').addEventListener('click', () => { syncSettingsUI(); openPanel(panelSettings); });

})();
</script>
